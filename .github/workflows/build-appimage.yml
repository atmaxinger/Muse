name: Build AppImage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.arch == 'aarch64' && 'arm64v8/debian:sid' || 'debian:sid' }}
      options: --privileged
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-pip python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 libglib2.0-dev-bin libcairo2-dev python3-dev libfuse2 libgirepository1.0-dev libxml2-utils wget file binutils patch

      - name: Install appimage-builder
        run: |
          pip3 install appimage-builder --break-system-packages

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/share/muse AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp -r src assets requirements.txt AppDir/usr/share/muse/
          cp com.pocoguy.Muse.desktop AppDir/usr/share/applications/
          cp assets/icons/hicolor/scalable/actions/compass2-symbolic.svg AppDir/usr/share/icons/hicolor/scalable/apps/com.pocoguy.Muse.svg

          # Install glib-compile-resources
          apt-get install -y libglib2.0-dev
          glib-compile-resources --sourcedir=. src/muse.gresource.xml --target=AppDir/usr/share/muse/src/muse.gresource

          # Detect Python version in Sid
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          SITE_PACKAGES="AppDir/usr/lib/python${PYTHON_VERSION}/site-packages"
          mkdir -p "$SITE_PACKAGES"

          # Exclude PyGObject and mprisify from bulk install to avoid compilation
          grep -vE "PyGObject|mprisify" requirements.txt > requirements-pure.txt
          pip3 install -r requirements-pure.txt --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages
          pip3 install pydbus --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages --no-deps
          pip3 install "mprisify @ git+https://gitlab.com/zehkira/mprisify.git@v1.0.0" --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages --no-deps
          pip3 install "yt-dlp[default]" --target="$SITE_PACKAGES" --no-cache-dir --break-system-packages

          # Create launcher
          cat > AppDir/usr/bin/muse << EOF
          #!/bin/bash
          # Include all possible bundled python paths
          # On Arch, we use a dynamic python version discovery
          PYTHON_VERSION=\$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          export PYTHONPATH="\$APPDIR/usr/share/muse:\$APPDIR/usr/lib/python\$PYTHON_VERSION/site-packages:\$APPDIR/usr/lib/python3/dist-packages"
          export PYTHONHOME="\$APPDIR/usr"
          cd "\$APPDIR/usr/share/muse"
          exec python3 src/main.py "\$@"
          EOF
          chmod +x AppDir/usr/bin/muse

      - name: Adapt Architecture for aarch64
        if: matrix.arch == 'aarch64'
        run: |
          sed -i 's/x86_64/aarch64/g' AppImageBuilder.yml
          sed -i 's/amd64/arm64/g' AppImageBuilder.yml
          # No need to change repo URLs for Arch in the same way as Ubuntu

      - name: Setup multiarch (not needed for Arch repo)
        if: matrix.arch == 'aarch64'
        run: |
          echo "Using Arch ARM64 container, no manual dpkg setup needed"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          appimage-builder --recipe AppImageBuilder.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mixtapes-${{ matrix.arch }}-appimage
          path: "*.AppImage"
